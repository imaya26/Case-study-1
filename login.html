<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

  <div class="login-box">

    <h2>Login</h2>

    <!-- Error Message (displayed above userId) -->
    <div id="errorMsg"></div>

    <form>

      <!-- User ID -->
      <div class="input-box">
        <input type="text" id="userId" placeholder="User ID">
        <i class='bx bxs-user'></i>
      </div>

      <!-- Password -->
      <div class="input-box">
        <input type="password" id="password" placeholder="Password" maxlength="30">
        <i class='bx bxs-lock'></i>
      </div>

      <!-- Login Button -->
      <button type="button" onclick="validateLogin()">Login</button>

    </form>

    <div class="register-link">
      <p>New User? <a href="register.html">Register Yourself</a></p>
    </div>

  </div>

  <!-- Internal JavaScript -->
  <script>
    // Static users database
    const staticUsers = [
      { id: "12345", pwd: "pass123", name: "John Doe" },
      { id: "54321", pwd: "admin123", name: "Admin User" },
      { id: "11111", pwd: "user1234", name: "Test User" }
    ];

    function validateLogin() {
      const userId = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorDiv = document.getElementById("errorMsg");

      errorDiv.style.display = "block";
      errorDiv.innerHTML = "";

      // Mandatory check
      if (userId === "" || password === "") {
        errorDiv.innerHTML = "Both fields are required";
        return;
      }

      // User ID validation (numeric & max 5 digits)
      if (!/^[0-9]{1,5}$/.test(userId)) {
        errorDiv.innerHTML = "User ID must be numeric and max 5 digits";
        return;
      }

      // Password validation (6-30 characters)
      if (password.length < 6 || password.length > 30) {
        errorDiv.innerHTML = "Password must be between 6 and 30 characters";
        return;
      }

      // Check credentials
      let idMatch = false;
      let pwdMatch = false;
      let userName = "";

      staticUsers.forEach(user => {
        if (user.id === userId) {
          idMatch = true;
          userName = user.name;
          if (user.pwd === password) {
            pwdMatch = true;
          }
        }
      });

      // Display validation messages
      if (!idMatch && !pwdMatch) {
        errorDiv.innerHTML = "Both ID/password not valid";
      } else if (!idMatch) {
        errorDiv.innerHTML = "ID not valid";
      } else if (!pwdMatch) {
        errorDiv.innerHTML = "Password not valid";
      } else {
        // ✅ SUCCESS → store user info and redirect
        sessionStorage.setItem("loggedInUser", userName);
        sessionStorage.setItem("userId", userId);
        window.location.href = "home.html";
      }
    }

    // Allow Enter key to trigger login
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("password").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
          validateLogin();
        }
      });
    });
  </script>

</body>
</html>
